<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다온이가 주는 비밀선물 🎁</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff0f6 0%, #ffe8f5 50%, #ffd6ef 100%);
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      overflow: hidden;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      font-size: 1.2rem;
      animation: float 4s ease-in-out infinite;
      opacity: 0.6;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
      50% { transform: translateY(-20px) rotate(15deg); opacity: 1; }
    }

    .card {
      background: white;
      border-radius: 32px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(255, 100, 180, 0.2);
      max-width: 400px;
      width: 90%;
      position: relative;
      z-index: 1;
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      from { transform: scale(0.6); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .emoji-top {
      font-size: 4rem;
      margin-bottom: 16px;
      display: block;
      animation: bounce 1.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 800;
      color: #d63384;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #aaa;
      margin-bottom: 32px;
    }

    #qrcode {
      display: inline-block;
      padding: 16px;
      background: #fff;
      border-radius: 16px;
      border: 3px dashed #ffb3d9;
      margin-bottom: 20px;
    }

    .hint {
      font-size: 0.9rem;
      color: #e75480;
      font-weight: 600;
      background: #fff0f6;
      padding: 10px 20px;
      border-radius: 50px;
      display: inline-block;
    }

    .hearts {
      margin-top: 24px;
      font-size: 1.4rem;
      letter-spacing: 6px;
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="card">
  <span class="emoji-top">🎁</span>
  <h1>다온이가 주는<br>비밀선물이 있어요</h1>
  <p class="subtitle">QR 코드를 찍어보세요!</p>

  <div id="qrcode"></div>

  <p class="hint">📷 카메라로 찍어봐요</p>

  <div class="hearts">💗 💗 💗</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  new QRCode(document.getElementById("qrcode"), {
    text: "https://yangil.github.io/daon/next-time.html",
    width: 200,
    height: 200,
    colorDark: "#d63384",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });

  // 별 파티클 생성
  const stars = document.getElementById('stars');
  const emojis = ['⭐', '✨', '💫', '🌟', '💖', '🎀'];
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('span');
    s.className = 'star';
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = (Math.random() * 4) + 's';
    s.style.animationDuration = (3 + Math.random() * 3) + 's';
    s.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
    stars.appendChild(s);
  }
</script>
</body>
</html>
